name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy functions to'
        required: false
        default: 'prod-old'
        type: choice
        options:
          - prod-old
          - prod-new
          - dev

permissions:
  contents: read

jobs:
  # Deploy functions from main branch to prod-old (rur-24)
  deploy_main:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      working-directory: functions
      run: npm install

    - name: Deploy to Firebase Functions (prod-old)
      run: |
        npm install -g firebase-tools
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RUR_24 }}' > sa.json
        export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
        firebase deploy --only functions --project rur-24

  # Deploy functions from dev branch - rur-24
  deploy_dev_rur_24:
    if: github.ref == 'refs/heads/dev' && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'prod-old')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      working-directory: functions
      run: npm install

    - name: Deploy to Firebase Functions (prod-old)
      run: |
        npm install -g firebase-tools
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RUR_24 }}' > sa.json
        export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
        firebase deploy --only functions --project rur-24

  # Deploy functions from dev branch - prod-26
  deploy_dev_prod_26:
    if: github.ref == 'refs/heads/dev' && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'prod-new')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      working-directory: functions
      run: npm install

    - name: Deploy to Firebase Functions (prod-new)
      run: |
        npm install -g firebase-tools
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD_26 }}' > sa.json
        export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
        firebase deploy --only functions --project rur-26-web-prod

  # Deploy functions from dev branch - dev
  deploy_dev_dev:
    if: github.ref == 'refs/heads/dev' && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev' || github.event.inputs.environment == '')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      working-directory: functions
      run: npm install

    - name: Deploy to Firebase Functions (dev)
      run: |
        npm install -g firebase-tools
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}' > sa.json
        export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
        firebase deploy --only functions --project rur-26-dev

  # Manual deployment workflow
  deploy_manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      working-directory: functions
      run: npm install

    - name: Deploy to Firebase Functions
      run: |
        npm install -g firebase-tools
        if [ "${{ github.event.inputs.environment }}" == "prod-old" ]; then
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RUR_24 }}' > sa.json
          PROJECT="rur-24"
        elif [ "${{ github.event.inputs.environment }}" == "prod-new" ]; then
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD_26 }}' > sa.json
          PROJECT="rur-26-web-prod"
        else
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}' > sa.json
          PROJECT="rur-26-dev"
        fi
        export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
        firebase deploy --only functions --project $PROJECT
