name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy functions to'
        required: false
        default: 'rur-26-prod'
        type: choice
        options:
          - all
          - rur-26-prod
          - rur-26-dev

permissions:
  contents: read

jobs:
  # Deploy functions from main branch to prod-26
  deploy_main:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      working-directory: functions
      run: npm install

    - name: Deploy to Firebase Functions (prod-26)
      run: |
        npm install -g firebase-tools
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD_26 }}' > sa.json
        export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
        firebase deploy --only functions --project rur-26-web-prod

